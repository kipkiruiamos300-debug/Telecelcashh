<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B00">
    <title>Telecel Play · Loan Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a00 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card */
        .calculator-card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 107, 0, 0.2);
            padding: 20px 18px 24px;
        }

        /* Header */
        .card-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #FF6B00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 4px;
            text-align: center;
        }

        /* Telecel Tagline */
        .telecel-tagline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
        }
        .telecel-tagline-text {
            font-size: 0.7rem;
            font-weight: 500;
            color: #FF6B00;
            background: rgba(255, 107, 0, 0.1);
            padding: 5px 14px;
            border-radius: 30px;
        }

        /* Slider Groups */
        .slider-group {
            margin-bottom: 28px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .slider-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .slider-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: #FF6B00;
            background: rgba(255, 107, 0, 0.12);
            padding: 5px 12px;
            border-radius: 30px;
        }

        /* Custom Slider - Mobile Friendly */
        .custom-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #2a2a2a;
            border-radius: 10px;
            outline: none;
            margin: 12px 0 6px;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #FF6B00;
            cursor: pointer;
            box-shadow: 0 0 0 2px #1a1a1a, 0 0 0 4px rgba(255, 107, 0, 0.3);
        }

        .custom-slider:active::-webkit-slider-thumb {
            transform: scale(1.15);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.6rem;
            color: #6b6b6b;
        }

        /* Interest Rate */
        .interest-static {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 107, 0, 0.12);
        }

        .interest-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .interest-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #FF6B00;
            background: rgba(255, 107, 0, 0.12);
            padding: 5px 16px;
            border-radius: 30px;
        }

        /* Result Section */
        .result-section {
            text-align: center;
            margin: 20px 0 18px;
            padding: 18px;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.08), rgba(255, 107, 0, 0.03));
            border-radius: 28px;
        }

        .result-amount {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ffffff, #FF6B00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .result-label-text {
            font-size: 0.75rem;
            font-weight: 500;
            color: #8a8a8a;
            margin-top: 6px;
        }

        /* Apply Button - Large for mobile touch */
        .apply-btn {
            width: 100%;
            background: linear-gradient(135deg, #FF6B00, #E05A00);
            border: none;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin-top: 8px;
            min-height: 54px;
        }

        .apply-btn:active {
            transform: scale(0.97);
        }

        /* Trust Badges - Mobile friendly */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .trust-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            color: #8a8a8a;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 10px;
            border-radius: 30px;
        }

        /* Security Note */
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 0.6rem;
            color: #6b6b6b;
            padding-top: 10px;
        }

        /* Small screen adjustments */
        @media (max-width: 450px) {
            body {
                padding: 8px;
            }
            .calculator-card {
                padding: 16px 14px 20px;
                border-radius: 28px;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .result-amount {
                font-size: 2rem;
            }
            .slider-value, .interest-value {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
            .custom-slider::-webkit-slider-thumb {
                width: 26px;
                height: 26px;
            }
            .trust-badges {
                gap: 10px;
            }
            .trust-item {
                font-size: 0.6rem;
                padding: 4px 8px;
            }
        }

        /* Extra small phones */
        @media (max-width: 380px) {
            .result-amount {
                font-size: 1.8rem;
            }
            .slider-label, .interest-label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="calculator-card">
        <div class="card-title">📱 Telecel Cash</div>
        
        <div class="telecel-tagline">
            <span class="telecel-tagline-text">Powered by Telecel Cash</span>
        </div>

        <!-- Loan Amount Slider -->
        <div class="slider-group">
            <div class="slider-header">
                <span class="slider-label">I want to borrow</span>
                <span class="slider-value" id="borrowValueLabel">GHS 500</span>
            </div>
            <input type="range" id="amountSlider" class="custom-slider" min="100" max="5000" value="500" step="1">
            <div class="range-labels">
                <span>GHS 100</span>
                <span>GHS 2,500</span>
                <span>GHS 5,000</span>
            </div>
        </div>

        <!-- Duration Slider -->
        <div class="slider-group">
            <div class="slider-header">
                <span class="slider-label">Duration</span>
                <span class="slider-value" id="durationLabel">3 Months</span>
            </div>
            <input type="range" id="durationSlider" class="custom-slider" min="1" max="24" value="3" step="1">
            <div class="range-labels">
                <span>1 mo</span>
                <span>12 mos</span>
                <span>24 mos</span>
            </div>
        </div>

        <!-- Interest Rate -->
        <div class="interest-static">
            <span class="interest-label">Interest Rate</span>
            <span class="interest-value">5% APR</span>
        </div>
    </div>

    <!-- Result Display -->
    <div class="result-section">
        <div class="result-amount" id="monthlyRepayment">GHS 167.36</div>
        <div class="result-label-text">Estimated Monthly Repayment</div>
    </div>

    <!-- Apply Button -->
    <button class="apply-btn" id="applyNowBtn">Apply Now →</button>

    <!-- Trust Badges -->
    <div class="trust-badges">
        <div class="trust-item">✅ No hidden fees</div>
        <div class="trust-item">🔒 Secure</div>
        <div class="trust-item">⚡ Fast approval</div>
    </div>

    <div class="security-note">
        <span>🔒</span> Your information is encrypted and secure
    </div>
</div>

<script>
    const amountSlider = document.getElementById('amountSlider');
    const durationSlider = document.getElementById('durationSlider');
    const borrowLabel = document.getElementById('borrowValueLabel');
    const durationLabel = document.getElementById('durationLabel');
    const monthlyRepaymentSpan = document.getElementById('monthlyRepayment');
    const applyBtn = document.getElementById('applyNowBtn');
    const RATE = 5;
    let currentMonthly = 0;

    function calcMonthly(principal, months, annualRate) {
        if (principal <= 0 || months <= 0) return 0;
        const r = (annualRate / 100) / 12;
        if (r === 0) return principal / months;
        const factor = Math.pow(1 + r, months);
        return principal * r * factor / (factor - 1);
    }

    function updateAll() {
        let amount = parseFloat(amountSlider.value);
        let months = parseInt(durationSlider.value);
        if (isNaN(amount)) amount = 500;
        if (isNaN(months)) months = 3;
        
        borrowLabel.innerText = 'GHS ' + amount.toLocaleString('en-US');
        durationLabel.innerText = months + ' Month' + (months !== 1 ? 's' : '');
        currentMonthly = calcMonthly(amount, months, RATE);
        monthlyRepaymentSpan.innerText = 'GHS ' + currentMonthly.toFixed(2);
    }

    amountSlider.addEventListener('input', updateAll);
    durationSlider.addEventListener('input', updateAll);
    updateAll();

    applyBtn.addEventListener('click', () => {
        const amount = parseFloat(amountSlider.value);
        const months = parseInt(durationSlider.value);
        const url = 'apply.html'
            + '?amount=' + amount.toFixed(2)
            + '&term=' + months
            + '&rate=' + RATE
            + '&monthly=' + currentMonthly.toFixed(2)
            + '&totalPayment=' + (currentMonthly * months).toFixed(2);
        window.location.href = url;
    });
</script>
</body>
</html>
